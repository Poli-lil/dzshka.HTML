<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dz psev</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
  }

  div {
    max-width: 600px;
    max-height: 300px;
    overflow: auto;
    border: 1px solid #dfd8d8;
  }

  table {
    border-collapse: collapse;
    width: 800px;
  }

  th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
    background: #f9f3f3;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #c0e0f0;
  }


  th:first-child,
  td:first-child {
    position: sticky;
    left: 0;
    background: #a1d1ea;
  }

  
  tbody tr:nth-child(even) td {
    background: #f5f0f0;
  }
</style>
</head>
<body>

<div>
  <table>
    <thead>
      <tr>
        <th></th>
        <th>Header 1</th>
        <th>Header 2</th>
        <th>Header 3</th>
        <th>Header 4</th>
        <th>Header 5</th>
      </tr>
    </thead>
    <tbody>

      <tr><td>Line 2</td><td>23</td><td>63</td><td>25</td><td>7</td><td>23</td></tr>
      <tr><td>Line 3</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>

      <tr><td>Line 5</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
      <tr><td>Line 6</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
      <tr><td>Line 7</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
      <tr><td>Line 8</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
      <tr><td>Line 9</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
      <tr><td>Line 10</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>

</div>

</body>
</html>
