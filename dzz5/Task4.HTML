<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>icon</title>
</head>
<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
}

footer{
    background:#365a78;
    color:white;
    padding:40px 0;
}

.footer-container{
    width:800px;
    margin:auto;
    display:flex;
    justify-content:space-between;
}

.footer-menu{
    display:flex;
    gap:80px;
}

.footer-menu ul{
    list-style:none;
    padding:0;
}

.footer-menu li{
    margin:6px 0;
}

.footer-menu a{
    color:white;
    text-decoration:none;
}

.footer-menu a:hover{
    text-decoration:underline;
}

.social{
    display:flex;
    gap:15px;
    align-items:flex-start;
}

.icon{
    width:40px;
    height:40px;
    background-size:cover;
}

.facebook{
    background-image:url("..//dzz5/fb_gray.png");
}

.instagram{
    background-image:url("..//dzz5/insta_gray.png");
}

.youtube{
    background-image:url("..//dzz5/youtube_gray.png");
}

.facebook:hover{
    background-image:url("facebook_color.png");
}

.instagram:hover{
    background-image:url("..//dzz5/insta.png");
}

.youtube:hover{
    background-image:url("..//dzz5/youtube.png");
}

.line{
    width:800px;
    margin:30px auto 10px;
    border-top:1px solid #9bb3c7;
}


</style>
</head>

<body>

<footer>

<div class="footer-container">

<div class="footer-menu">

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">News</a></li>
</ul>

<ul>
<li><a href="#">Blog</a></li>
<li><a href="#">FAQ</a></li>
<li><a href="#">Contacts</a></li>
<li><a href="#">Privacy & cookies</a></li>
</ul>

</div>

<div class="social">
<div class="icon facebook"></div>
<div class="icon instagram"></div>
<div class="icon youtube"></div>
</div>

</div>

<div class="line"></div>


</footer>

</body>
</html>
