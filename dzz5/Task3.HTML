<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>st</title>
</head>
<style>

body{
    width:900px;
    margin:auto;
    font-family:Arial;
}

header{
    background:#8c2d4f;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#6f1f3c;
    color:white;
    padding:15px;
    text-align:center;
}

.aside-left{
    width:20%;
    float:left;
}

aside{
    background:#b35a7c;
    color:white;
    padding:30px;
    margin:10px;
    text-align:center;
}

main{
    width:55%;
    float:left;
    background:#b35a7c;
    padding:20px;
    margin:10px;
    color:white;
}

section{
    background:#d88aa6;
    padding:30px;
    margin:10px 0;
    text-align:center;
}

.aside-right{
    width:15%;
    float:left;
    background:#b35a7c;
    color:white;
    padding:80px 10px;
    margin:10px;
    text-align:center;
}

footer{
    clear:both;
    background:#6f1f3c;
    color:white;
    padding:20px;
    text-align:center;
}

</style>
</head>

<body>

<header>
HEADER
</header>

<nav>
MENU
</nav>

<div class="aside-left">
<aside>ASIDE 1</aside>
<aside>ASIDE 2</aside>
</div>

<main>
MAIN CONTENT

<section>SECTION 1</section>
<section>SECTION 2</section>

</main>

<div class="aside-right">
ASIDE 3
</div>

<footer>
FOOTER
</footer>

</body>
</html>

<!-- nav - меню
aside - две левые панели
section- две панели по центру -->
