<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frut</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
    }

    ul {
        background-color: #f3cfcf;
        padding: 20px;
        width: 250px;
        margin: 40px auto;
        list-style-type: none;
    }

    li {
        background-color: #e8a9a9;
        margin: 10px 0;
        padding: 10px;
    }

    .dark {
        background-color: #d97c7c;
    }

    span {
        background-color: #b94b4b;
        padding: 5px 10px;
        color: white;
    }
</style>

</head>

<body>

<h2 class="center">Список фруктів</h2>

<ul>
    <li><span>Яблуко</span></li>
    <li><span>Банан</span></li>
    <li class="dark"><span>Апельсин</span></li>
    <li><span>Груша</span></li>
    <li><span>Ківі</span></li>
</ul>

</body>
</html>

<!-- ul -ненумерованный список li -элемент списка -->
