<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f5f5;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ddd;
    padding: 10px 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
}

.logo img {
    width: 30px;
}

.user {
    display: flex;
    align-items: center;
    gap: 10px;
}

.user img {
    width: 35px;
    border-radius: 50%;
}

.container {
    display: flex;
}


.sid {
    width: 200px;
    background: #eee;
    padding: 20px;
}

.sidul {
    list-style: none;
}

.sid li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    cursor: pointer;
}

.sid li.active {
    background: #f3d6d6;
}

.sid img {
    width: 20px;
}
.mail-list {
    flex: 1;
    padding: 20px;
}

.mail-item {
    display: grid;
    grid-template-columns: 40px 1fr 2fr 80px;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #ccc;
}

.mail-item:hover {
    background: #eee;
}

.icon {
    width: 20px;
}

.from {
    font-weight: bold;
}

.subject {
    color: #555;
}

.date {
    text-align: right;
    color: #888;
}

@media (max-width: 800px) {
    .container {
        flex-direction: column;
    }

    .sid {
        width: 100%;
        display: flex;
        justify-content: space-around;
    }

    .sid ul {
        display: flex;
        width: 100%;
        justify-content: space-around;
    }

    .mail-item {
        grid-template-columns: 30px 1fr;
        grid-template-rows: auto auto;
    }

    .subject {
         grid-column: span 2; /*на сколько колонок растягивается элемент */
    }

    .date {
        grid-column: span 2;
        text-align: left;
    }
}
    </style>
</head>
<body>
    <header class="header">
    <div class="logo">
        <img src="img/logo.png" alt="logo">
        <span>MY MAIL</span>
    </div>

    <div class="user">
        <span>user@mymail.com</span>
        <img src="img/avatar.png" alt="user">
    </div>
</header>

<div class="container">

    <aside class="sidebar">
        <ul>
            <li class="active">
                <img src="..//dzadap/incom.png"> Incoming
            </li>
            <li>
                <img src="..//dzadap/outcom.png"> Outgoing
            </li>
            <li>
                <img src="..//dzadap/draft.png"> Drafts
            </li>
            <li>
                <img src="..//dzadap/spam.png"> Spam
            </li>
        </ul>
    </aside>

    <main class="mail-list">

        <div class="mail-item">
            <img src="..//dzadap/star2.svg" class="icon">
            <div class="from">me, Alex</div>
            <div class="subject">Trip to South America</div>
            <div class="date">12 Apr</div>
        </div>

        <div class="mail-item">
            <img src="..//dzadap/star1.svg" class="icon">
            <div class="from">me, John</div>
            <div class="subject">Santa Monica trip</div>
            <div class="date">11 Apr</div>
        </div>

        <div class="mail-item">
            <img src="..//dzadap/star2.svg" class="icon">
            <div class="from">John, Alex</div>
            <div class="subject">Birthday party</div>
            <div class="date">10 Apr</div>
        </div>

        <div class="mail-item">
            <img src="..//dzadap/star1.svg" class="icon">
            <div class="from">Bill, John</div>
            <div class="subject">Ut congue purus</div>
            <div class="date">5 Apr</div>
        </div>

        <div class="mail-item">
            <img src="..//dzadap/star2.svg" class="icon">
            <div class="from">Mary White</div>
            <div class="subject">Report (February 2019)</div>
            <div class="date">10 Mar</div>
        </div>

    </main>

</div>
    
</body>
</html>
