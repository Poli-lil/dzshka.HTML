        gap: 20px;

    .card {
        border: 1px solid #eae4e4;

    .card img {

    }

    .title {
        font-weight: bold;
        margin: 10px 0 5px;
    }

    .descc {
        font-size: 14px;
        color: #858484;
        margin-bottom: 10px;
    }

    .price {
        color: rgb(252, 41, 41);
        font-weight: bold;
        margin-bottom: 10px;
    }

    .btn {
        background-color: #2c3e50;
        color: white;
        border: none;
        padding: 8px 15px;
        cursor: pointer;
    }

    .btn:hover {
        background-color: #34495e;
    }
</style>
</head>

<div class="container">
